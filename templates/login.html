{% extends "base.html" %}

{% block title %}Admin Login - Forex Broker{% endblock %}

{% block body %}
<div class="auth-wrapper">
    <div class="glass-panel auth-card">
        <h2 class="auth-title">Admin Login</h2>
        
        {% if error %}
            <div class="error-msg">{{ error }}</div>
        {% endif %}
        
        <form action="/login" method="POST">
            <div style="margin-bottom: 1.2rem;">
                <label for="username" style="display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: var(--text-muted);">Username</label>
                <input type="text" id="username" name="username" class="form-input" required autocomplete="off">
            </div>
            
            <div style="margin-bottom: 2rem;">
                <label for="password" style="display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: var(--text-muted);">Password</label>
                <input type="password" id="password" name="password" class="form-input" required>
            </div>
            
            <button type="submit" class="btn-primary" style="width: 100%; padding: 0.8rem; font-size: 1rem;">Login</button>
        </form>
    </div>
</div>
{% endblock %}
